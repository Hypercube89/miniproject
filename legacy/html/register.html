<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="../css/register.css">
  <link rel="icon" type="image/x-icon" href="../images/lpage.png">
</head>

<body>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <div class="bg-overlay"></div>

  <div class="register-card">
    <h1>Register</h1>

    <form class="register-form" onsubmit="return validateRegister(event)">

      <div class="input-box">
        <input type="text" id="name" placeholder="Full Name" required>
      </div>

      <div class="input-box">
        <input type="email" id="email" placeholder="Email Address" required>
      </div>

      <div class="input-box">
        <label class="dob-label">Age (Date of Birth)</label>
        <input type="date" id="dob" required>
      </div>

      <div class="input-box">
        <input type="password" id="password" placeholder="Password" required>
      </div>

      <div class="input-box">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      </div>

      <!-- Show Password -->
      <div style="margin-bottom:15px; text-align:left;">
        <label style="color:white; font-size:14px;">
          <input type="checkbox" onclick="togglePasswords()">
          Show Passwords
        </label>
      </div>

      <button type="submit" class="btn">Create Account</button>

      <p class="bottom-text">
        Already have an account?
        <a href="login.html">Login</a>
      </p>
      <div id="root"></div>

    </form>
  </div>

  <!-- JavaScript -->
  <script>

    function togglePasswords(){
      const pass = document.getElementById("password");
      const confirm = document.getElementById("confirmPassword");

      if(pass.type === "password"){
        pass.type = "text";
        confirm.type = "text";
      } else {
        pass.type = "password";
        confirm.type = "password";
      }
    }

    function validateRegister(event){

      event.preventDefault(); // stop submission

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const dob = document.getElementById("dob").value;
      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      const today = new Date();
      const selectedDate = new Date(dob);

      const namePattern = /^[a-zA-Z ]{3,30}$/;
      const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{6,}$/;

      if(!namePattern.test(name)){
        alert("Name must contain only letters and be 3-30 characters long.");
        return false;
      }

      if(selectedDate > today){
        alert("Date of Birth cannot be in the future.");
        return false;
      }

      if(!passwordPattern.test(password)){
        alert("Password must contain at least 6 characters including uppercase, lowercase, number and special character.");
        return false;
      }

      if(password !== confirmPassword){
        alert("Passwords do not match.");
        return false;
      }

      alert("Registration Successful ✅");

      return false; // prevent refresh
    }

  </script>

</body>
</html>
